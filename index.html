<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЧГУ Мероприятия</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { transition: transform 0.2s; height: 100%; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-img-top { height: 200px; object-fit: cover; background: #f8f9fa; }
        .loading-spinner { display: none; text-align: center; padding: 50px; }
        .filter-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .faculty-badge { font-size: 0.8rem; }
        .event-date { color: #6c757d; font-size: 0.9rem; }
        .source-tag { position: absolute; top: 10px; right: 10px; z-index: 2; }
    </style>
</head>
<body>
    <div class="container text-center mt-3 mb-3">
        <h4 class="fs-6 fs-sm-5 fs-md-4 fs-lg-3">🎓 ЧГУ Мероприятия</h4>
    </div>

    <!-- Вкладки -->
    <div class="container mb-3">
        <ul class="nav nav-pills justify-content-center" id="mainTabs">
            <li class="nav-item">
                <button class="nav-link active" data-tab="all">📋 Все мероприятия</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-tab="ivt">💻 ИВТ</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-tab="chimfac">🧪 Химфак</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-tab="energo">⚡ Энергетика</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-tab="econom">📈 Экономика</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-tab="law">⚖️ Юрфак</button>
            </li>
        </ul>
    </div>

    <!-- Фильтры (показываем только на вкладке "Все") -->
    <div class="container mb-4" id="filtersSection">
        <div class="filter-section">
            <div class="mb-3">
                <small class="text-muted d-block mb-2">Категория:</small>
                <nav class="nav nav-pills flex-wrap justify-content-center" id="categoryNav">
                    <button class="nav-link active me-2 mb-2" data-category="all">Все</button>
                    <button class="nav-link me-2 mb-2" data-category="science">🔬 Наука</button>
                    <button class="nav-link me-2 mb-2" data-category="sport">⚽ Спорт</button>
                    <button class="nav-link me-2 mb-2" data-category="creative">🎨 Творчество</button>
                    <button class="nav-link me-2 mb-2" data-category="conference">📊 Конференции</button>
                </nav>
            </div>
            <div>
                <small class="text-muted d-block mb-2">Факультет:</small>
                <div class="d-flex flex-wrap justify-content-center gap-2" id="facultyFilter">
                    <button class="btn btn-outline-secondary btn-sm active" data-faculty="all">Все</button>
                    <button class="btn btn-outline-secondary btn-sm" data-faculty="ivt">💻 ИВТ</button>
                    <button class="btn btn-outline-secondary btn-sm" data-faculty="chimfac">🧪 Химфак</button>
                    <button class="btn btn-outline-secondary btn-sm" data-faculty="energo">⚡ Энергетика</button>
                    <button class="btn btn-outline-secondary btn-sm" data-faculty="econom">📈 Экономика</button>
                    <button class="btn btn-outline-secondary btn-sm" data-faculty="law">⚖️ Юрфак</button>
                </div>
            </div>
        </div>
    </div>

    <main>
        <div class="container" id="catalogCardEvent">
            <div class="loading-spinner" id="loader">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Загрузка...</span>
                </div>
                <p class="mt-2">Загружаем события...</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
